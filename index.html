<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Flor de Liz | Pilates e Bem-Estar</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2647/2647625.png">

    <!-- Tailwind CSS (Estilos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM (O motor do site) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Para entender o código React no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion (Animações) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Fontes -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
        .glass-nav {
            background: rgba(250, 250, 245, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(79, 111, 82, 0.1);
        }
    </style>
</head>
<body class="bg-[#FAFAF5]">
    <div id="root"></div>

    <script type="text/babel">
        // Importando as bibliotecas globais
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- DEFINIÇÃO MANUAL DE ÍCONES (Para eliminar erros de biblioteca externa) ---
        const Icon = ({ children, size = 24, className = "", ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className} 
                {...props}
            >
                {children}
            </svg>
        );

        const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Leaf = (props) => <Icon {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;
        const Activity = (props) => <Icon {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;
        const Users = (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Instagram = (props) => <Icon {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></Icon>;
        const Facebook = (props) => <Icon {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></Icon>;
        const ChevronDown = (props) => <Icon {...props}><path d="m6 9 6 6 6-6"/></Icon>;
        const ChevronUp = (props) => <Icon {...props}><path d="m18 15-6-6-6 6"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Calendar = (props) => <Icon {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const Heart = (props) => <Icon {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
        // --------------------------------------------------------------------------

        const WHATSAPP_URL = "https://wa.me/5511968429937?text=Ol%C3%A1,+vim+do+site+do+Studio+de+Pilates.+Pode+me+ajudar?+";

        const WhatsAppIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} fill="currentColor" viewBox="0 0 24 24" className={className}>
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
            </svg>
        );

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            // Carousel State
            const [currentHeroIndex, setCurrentHeroIndex] = useState(0);
            
            // IMAGENS LOCAIS
            // Lembre-se de colocar hero1.webp, hero2.webp, etc. na mesma pasta
            const heroImages = [
                "hero1.webp",
                "hero2.webp",
                "hero3.webp",
                "hero4.webp",
                "hero5.webp",
                "hero6.webp",
                "hero7.webp",
                "hero8.webp",
                "hero9.webp"
            ];

            // Handle scroll for navbar styling
            useEffect(() => {
                const handleScroll = () => {
                setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Carousel Auto-play
            useEffect(() => {
                const timer = setInterval(() => {
                setCurrentHeroIndex((prev) => (prev + 1) % heroImages.length);
                }, 5000); 
                return () => clearInterval(timer);
            }, [heroImages.length]);

            return (
                <div className="min-h-screen text-[#2D302D] font-sans overflow-x-hidden selection:bg-[#D4A373] selection:text-white">
                
                {/* 0. NAVIGATION BAR */}
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'glass-nav py-3' : 'bg-transparent py-5'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                    {/* Logo */}
                    <div className="flex items-center gap-2 z-50">
                        <Leaf className="text-[#4F6F52] w-6 h-6 fill-current" />
                        <h1 className="text-xl md:text-2xl font-bold tracking-tight text-[#4F6F52]">
                        Studio Flor de Liz
                        </h1>
                    </div>

                    {/* Desktop Links */}
                    <div className="hidden md:flex items-center gap-8 text-sm font-medium text-[#4F6F52]/80">
                        {['Diferenciais e Benefícios', 'Depoimentos', 'FAQ'].map((link) => (
                        <a 
                            key={link} 
                            href={`#${link.toLowerCase().replace(/ /g, '-')}`} 
                            className="hover:text-[#D4A373] transition-colors relative group"
                            title={`Ir para seção ${link}`}
                        >
                            {link}
                            <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-[#D4A373] transition-all group-hover:w-full" />
                        </a>
                        ))}
                    </div>

                    {/* CTA & Mobile Menu Toggle */}
                    <div className="flex items-center gap-4">
                        <a 
                        href={WHATSAPP_URL}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="hidden md:flex bg-[#4F6F52] hover:bg-[#3A523D] text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all shadow-lg shadow-[#4F6F52]/20 hover:shadow-[#4F6F52]/40 active:scale-95 items-center gap-2"
                        title="Agende sua sessão de Pilates pelo WhatsApp"
                        >
                        Agende sua sessão
                        </a>
                        
                        <button 
                        onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                        className="md:hidden z-50 p-2 text-[#4F6F52]"
                        aria-label="Menu principal"
                        >
                        {mobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                        </button>
                    </div>
                    </div>

                    {/* Mobile Menu Overlay */}
                    <AnimatePresence>
                    {mobileMenuOpen && (
                        <motion.div 
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        exit={{ opacity: 0, y: -20 }}
                        className="absolute top-0 left-0 w-full bg-[#FAFAF5] h-screen flex flex-col items-center justify-center gap-8 md:hidden z-40"
                        >
                        {['Diferenciais e Benefícios', 'Depoimentos', 'FAQ'].map((link) => (
                            <a 
                            key={link}
                            href={`#${link.toLowerCase().replace(/ /g, '-')}`}
                            onClick={() => setMobileMenuOpen(false)}
                            className="text-2xl font-serif text-[#4F6F52] hover:text-[#D4A373]"
                            >
                            {link}
                            </a>
                        ))}
                        <a 
                            href={WHATSAPP_URL}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="mt-4 bg-[#D4A373] text-white px-8 py-3 rounded-full text-lg shadow-xl flex items-center gap-2"
                        >
                            <WhatsAppIcon size={24} />
                            Agende sua sessão
                        </a>
                        </motion.div>
                    )}
                    </AnimatePresence>
                </nav>

                {/* 1. HERO SECTION */}
                <section className="relative pt-32 pb-20 md:pt-40 md:pb-32 px-6 overflow-hidden">
                    {/* Background Decorative Blobs */}
                    <div className="absolute top-0 right-0 -z-10 w-[600px] h-[600px] bg-[#E8E8D5] rounded-full blur-3xl opacity-50 translate-x-1/3 -translate-y-1/3 animate-pulse" style={{ animationDuration: '8s' }}></div>
                    <div className="absolute bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-[#FAD6A5] rounded-full blur-3xl opacity-30 -translate-x-1/4 translate-y-1/4"></div>

                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                    
                    {/* Text Content */}
                    <motion.div 
                        initial={{ opacity: 0, x: -50 }}
                        whileInView={{ opacity: 1, x: 0 }}
                        transition={{ duration: 0.8, ease: "easeOut" }}
                        className="flex flex-col gap-6"
                    >
                        <div className="inline-flex items-center gap-2 bg-[#4F6F52]/10 w-fit px-4 py-1.5 rounded-full border border-[#4F6F52]/20">
                        <span className="relative flex h-2 w-2">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#4F6F52] opacity-75"></span>
                            <span className="relative inline-flex rounded-full h-2 w-2 bg-[#4F6F52]"></span>
                        </span>
                        <span className="text-xs font-semibold tracking-wide uppercase text-[#4F6F52]">+1000 clientes atendidos</span>
                        </div>

                        <h1 className="text-5xl md:text-6xl lg:text-7xl font-semibold leading-[1.1] text-[#2D302D]">
                        Pilates: <br/>
                        <span className="text-[#4F6F52] italic">Postura Perfeita,</span> <br/>
                        Corpo Tonificado,<br/>
                        Vida Plena!
                        </h1>

                        <p className="text-lg text-gray-600 max-w-md leading-relaxed">
                        Melhore sua saúde e bem-estar em semanas com métodos comprovados e acompanhamento exclusivo no coração do Jardim Pedro José Nunes.
                        </p>

                        <div className="flex flex-col sm:flex-row gap-4 mt-4">
                        <a 
                            href={WHATSAPP_URL}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="bg-[#4F6F52] hover:bg-[#3A523D] text-white px-8 py-4 rounded-full font-medium shadow-xl shadow-[#4F6F52]/20 transition-all hover:-translate-y-1 flex items-center justify-center gap-2 group"
                            title="Marcar avaliação gratuita"
                        >
                            Agende sua avaliação
                            <ArrowRight size={18} className="group-hover:translate-x-1 transition-transform" />
                        </a>
                        </div>

                        <div className="flex items-center gap-4 mt-6 pt-6 border-t border-gray-200/60">
                        <div className="flex -space-x-3">
                            {[1,2,3].map(i => (
                            <div key={i} className="w-10 h-10 rounded-full border-2 border-[#FAFAF5] bg-gray-200 overflow-hidden">
                                <img 
                                src={`https://images.unsplash.com/photo-${i === 1 ? '1438761681033-6461ffad8d80' : i === 2 ? '1544005313-94ddf0286df2' : '1554151228-14d9def656ec'}?w=100&h=100&fit=crop`} 
                                alt={`Cliente satisfeito ${i} do Studio Flor de Liz`} 
                                className="w-full h-full object-cover" 
                                width="40" height="40"
                                />
                            </div>
                            ))}
                        </div>
                        <div className="text-sm">
                            <span className="block font-bold text-[#2D302D]">+15 anos</span>
                            <span className="text-gray-500">de experiência em Pilates</span>
                        </div>
                        </div>
                    </motion.div>

                    {/* Hero Image / Carousel */}
                    <motion.div 
                        initial={{ opacity: 0, scale: 0.95 }}
                        whileInView={{ opacity: 1, scale: 1 }}
                        transition={{ duration: 1 }}
                        className="relative"
                    >
                        <div className="relative rounded-[2.5rem] overflow-hidden shadow-2xl shadow-[#4F6F52]/20 aspect-[4/5] md:aspect-square">
                        {/* Carousel Images */}
                        <AnimatePresence>
                            <motion.img 
                            key={currentHeroIndex}
                            src={heroImages[currentHeroIndex]}
                            initial={{ opacity: 0, scale: 1.1 }}
                            animate={{ opacity: 1, scale: 1 }}
                            exit={{ opacity: 0 }}
                            transition={{ duration: 1.5 }}
                            alt={`Studio Flor de Liz - Ambiente de Pilates ${currentHeroIndex + 1}`}
                            className="absolute inset-0 w-full h-full object-cover"
                            loading="eager" 
                            onError={(e) => {
                                // Se a imagem local falhar, tenta usar um placeholder online para não ficar em branco
                                if(!e.target.src.includes('unsplash')) {
                                   console.log("Imagem local não encontrada: " + e.target.src);
                                }
                            }}
                            />
                        </AnimatePresence>
                        
                        {/* Overlay Gradient */}
                        <div className="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent pointer-events-none"></div>
                        
                        {/* Floating Card */}
                        <motion.div 
                            initial={{ y: 20, opacity: 0 }}
                            whileInView={{ y: 0, opacity: 1 }}
                            transition={{ delay: 0.5 }}
                            className="absolute bottom-6 left-6 right-6 bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-lg flex items-center gap-4 z-10"
                        >
                            <div className="bg-[#D4A373]/20 p-3 rounded-full text-[#D4A373]">
                            <Activity size={24} />
                            </div>
                            <div>
                            <p className="font-serif text-lg font-semibold text-[#2D302D]">Vitalidade Restaurada</p>
                            <p className="text-xs text-gray-500">Resultados visíveis em 4 semanas</p>
                            </div>
                        </motion.div>
                        </div>
                    </motion.div>
                    </div>
                </section>

                {/* 3. DIFERENCIAIS E BENEFÍCIOS SECTION */}
                <section id="diferenciais-e-benefícios" className="py-20 md:py-32 px-6 bg-white/50">
                    <div className="max-w-7xl mx-auto">
                    <div className="mb-12 text-center md:text-left">
                        <h2 className="text-4xl md:text-5xl font-serif text-[#2D302D] mb-4">Diferenciais e Benefícios</h2>
                        <p className="text-gray-600 max-w-xl">Descubra como nossa abordagem no Studio Flor de Liz pode transformar não apenas seu corpo, mas sua qualidade de vida e autoestima.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Main Feature Card - Height ajustada para h-full */}
                        <motion.div 
                        whileHover={{ y: -5 }}
                        className="md:col-span-2 relative h-80 md:h-full rounded-3xl overflow-hidden group shadow-xl"
                        >
                        <img 
                            src="https://images.unsplash.com/photo-1552196563-55cd4e45efb3?auto=format&fit=crop&q=80&w=800" 
                            alt="Estúdio completo com equipamentos de Pilates modernos" 
                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                            loading="lazy"
                        />
                        <div className="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors"></div>
                        <div className="absolute bottom-0 left-0 p-8">
                            <h3 className="text-2xl md:text-3xl font-serif text-white mb-2">Estúdio Completo & Moderno</h3>
                            <p className="text-white/90">Equipamentos de ponta para garantir a execução perfeita de cada movimento.</p>
                        </div>
                        </motion.div>

                        {/* Secondary Cards */}
                        <div className="flex flex-col gap-6">
                        <motion.div 
                            whileHover={{ y: -5 }}
                            className="flex-1 bg-white p-8 rounded-3xl shadow-sm border border-[#4F6F52]/10 flex flex-col justify-center hover:shadow-md transition-all"
                        >
                            <div className="w-12 h-12 bg-[#E8E8D5] rounded-full flex items-center justify-center mb-4 text-[#4F6F52]">
                            <Activity size={24} />
                            </div>
                            <h3 className="text-xl font-bold text-[#2D302D] mb-2">Correção Postural</h3>
                            <p className="text-sm text-gray-500">Exercícios terapêuticos focados em aliviar dores nas costas e alinhar a coluna.</p>
                        </motion.div>

                        <motion.div 
                            whileHover={{ y: -5 }}
                            className="flex-1 bg-[#4F6F52] p-8 rounded-3xl shadow-sm flex flex-col justify-center text-white"
                        >
                            <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mb-4 text-white">
                            <Heart size={24} />
                            </div>
                            <h3 className="text-xl font-bold mb-2">Cuidado Personalizado</h3>
                            <p className="text-sm text-white/80">Planos adaptados para reabilitação, fitness ou relaxamento.</p>
                        </motion.div>
                        </div>
                    </div>
                    </div>
                </section>

                {/* 5. TESTIMONIALS SECTION */}
                <section id="depoimentos" className="py-20 px-6 overflow-hidden">
                    <div className="max-w-7xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-serif text-[#2D302D]">O que dizem nossos alunos</h2>
                    </div>
                    
                    <div className="flex flex-col md:flex-row gap-6 md:gap-8 overflow-x-auto pb-8 snap-x">
                        {[
                        {
                            name: "Fernanda Santos",
                            text: "Excelentes aulas de Pilates, faço duas vezes por semana. Os instrutores são muito atenciosos e dedicados.",
                            img: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop"
                        },
                        {
                            name: "Leda Araújo",
                            text: "Um espaço lindo... funcional.... mas o melhor é encontrar profissionais capacitados que nos fazem felizes.... PARABÉNS!",
                            img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=100&h=100&fit=crop"
                        },
                        {
                            name: "Marco Salvador",
                            text: "Muito legal. 5 estrelas. A estrutura e a atenção aos detalhes fazem toda a diferença na prática.",
                            img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop"
                        }
                        ].map((t, i) => (
                        <motion.div 
                            key={i}
                            whileHover={{ y: -5 }}
                            className="min-w-[85%] md:min-w-[30%] bg-white p-8 rounded-3xl shadow-lg shadow-gray-100 border border-gray-100 snap-center"
                        >
                            <div className="flex gap-1 text-[#D4A373] mb-4">
                            {[...Array(5)].map((_,star) => <Star key={star} size={16} fill="currentColor" />)}
                            </div>
                            <p className="text-gray-600 italic mb-6 leading-relaxed">"{t.text}"</p>
                            <div className="flex items-center gap-4">
                            <img 
                                src={t.img} 
                                alt={`Foto de ${t.name}, aluno do Studio Flor de Liz`} 
                                className="w-12 h-12 rounded-full object-cover" 
                                loading="lazy"
                                width="48" height="48"
                            />
                            <div>
                                <p className="font-bold text-[#2D302D] text-sm">{t.name}</p>
                                <p className="text-xs text-gray-400">Cliente Verificado</p>
                            </div>
                            </div>
                        </motion.div>
                        ))}
                    </div>
                    </div>
                </section>

                {/* 6. FAQ SECTION */}
                <section id="faq" className="py-20 bg-white">
